# ================================================================
# SQA BUNGA - Konfigurasi SonarQube (White Box Testing)
# Proyek   : Form Pendaftaran Mahasiswa Baru USTI
# Versi    : 2026-2
# Tanggal  : 25 Juni 2026
#
# Cara menjalankan:
#   1. Pastikan SonarQube Server sudah berjalan (default: localhost:9000)
#   2. Generate token di: SonarQube > My Account > Security > Tokens
#   3. Set environment variable: export SONAR_TOKEN=token_anda
#   4. Jalankan scanner: sonar-scanner -Dsonar.login=$SONAR_TOKEN
#      ATAU dengan Maven : mvn sonar:sonar -Dsonar.login=$SONAR_TOKEN
#      ATAU via Docker   : docker run --rm -e SONAR_TOKEN=$SONAR_TOKEN \
#                            -v $(pwd):/usr/src sonarsource/sonar-scanner-cli
# ================================================================


# ----------------------------------------------------------------
# [A] IDENTITAS PROYEK
# ----------------------------------------------------------------

# Key unik proyek di SonarQube (tidak boleh ada spasi)
sonar.projectKey=sqa_bunga_mahasiswa_usti

# Nama tampilan proyek di dashboard SonarQube
sonar.projectName=SQA Bunga - Form Pendaftaran Mahasiswa Baru USTI

# Versi aplikasi yang sedang dianalisis
sonar.projectVersion=2026.2.0

# Deskripsi singkat proyek
sonar.projectDescription=White Box Testing untuk Form Pendaftaran Mahasiswa Baru \
  Universitas Sains Dan Teknologi Indonesia (USTI). \
  Analisis mencakup: Code Smells, Bugs, Vulnerabilities, Security Hotspots, \
  Duplications, dan Coverage pada kode PHP.


# ----------------------------------------------------------------
# [B] BAHASA & SUMBER KODE
# ----------------------------------------------------------------

# Bahasa pemrograman utama
sonar.language=php

# Direktori root kode sumber (relatif terhadap direktori proyek)
sonar.sources=.

# Hanya analisis file PHP
sonar.inclusions=**/*.php,**/*.phtml,**/*.php5

# Kecualikan direktori yang tidak perlu dianalisis
sonar.exclusions=**/vendor/**,\
                 **/node_modules/**,\
                 **/cache/**,\
                 **/tmp/**,\
                 **/*.min.php,\
                 **/tests/fixtures/**

# Direktori file pengujian (opsional, jika ada test suite)
sonar.tests=tests
sonar.test.inclusions=**/*Test.php,**/*Spec.php


# ----------------------------------------------------------------
# [C] ENCODING & METADATA PROYEK
# ----------------------------------------------------------------

# Encoding file sumber
sonar.sourceEncoding=UTF-8

# URL repositori kode sumber (isi sesuai repo Anda)
sonar.links.scm=https://github.com/username/sqa-bunga-mahasiswa-usti

# URL halaman utama proyek (isi sesuai deployment Anda)
sonar.links.homepage=http://localhost:8080/form_mahasiswa_baru.php

# URL tracker bug/issue (isi sesuai Jira project Anda)
sonar.links.issue=https://jira.anda.com/projects/SQAB


# ----------------------------------------------------------------
# [D] KONEKSI SERVER SONARQUBE
# ----------------------------------------------------------------

# URL server SonarQube
# Untuk lokal  : http://localhost:9000
# Untuk SonarCloud : https://sonarcloud.io
sonar.host.url=http://localhost:9000

# Token autentikasi — JANGAN hardcode di sini!
# Gunakan environment variable: export SONAR_TOKEN=sqa_xxxxxxxxxxxx
# atau jalankan dengan: sonar-scanner -Dsonar.login=$SONAR_TOKEN
# sonar.login=${SONAR_TOKEN}

# Untuk SonarCloud, tambahkan organization key:
# sonar.organization=nama-organisasi-anda


# ----------------------------------------------------------------
# [E] QUALITY GATE & QUALITY PROFILE
# ----------------------------------------------------------------

# Tunggu Quality Gate selesai dievaluasi sebelum pipeline lanjut
sonar.qualitygate.wait=true

# Timeout menunggu Quality Gate (dalam detik)
sonar.qualitygate.timeout=300

# Gunakan Quality Profile PHP bawaan SonarQube
# (ubah ke nama custom profile jika ada)
# sonar.profile=Sonar way


# ----------------------------------------------------------------
# [F] PENGUJIAN UNIT & CODE COVERAGE
# ----------------------------------------------------------------

# Path laporan coverage dari PHPUnit + Xdebug (format Clover XML)
# Untuk generate: phpunit --coverage-clover=coverage/clover.xml
sonar.php.coverage.reportPaths=coverage/clover.xml

# Path laporan hasil test unit (format JUnit XML)
# Untuk generate: phpunit --log-junit=test-reports/junit.xml
sonar.php.tests.reportPath=test-reports/junit.xml

# Minimum coverage yang diwajibkan Quality Gate (%)
# sonar.coverage.exclusions=**/vendor/**


# ----------------------------------------------------------------
# [G] DETEKSI DUPLIKASI KODE (Copy-Paste Detection)
# ----------------------------------------------------------------

# Minimum jumlah token berulang untuk dianggap duplikasi
sonar.cpd.php.minimumTokens=50

# Minimum jumlah baris berulang untuk dianggap duplikasi
sonar.cpd.php.minimumLines=5


# ----------------------------------------------------------------
# [H] ATURAN KEAMANAN KHUSUS (Security Rules)
# ----------------------------------------------------------------

# Analisis keamanan difokuskan pada:
#
# [1] XSS (Cross-Site Scripting) — CWE-79
#     File   : form_mahasiswa_baru.php
#     Risiko : Output $input langsung ke HTML
#     Status : AMAN (sudah menggunakan htmlspecialchars() pada baris:
#              value="<?= isset($_POST['nama']) ? htmlspecialchars($_POST['nama']) : '' ?>")
#     Namun  : $hasil, $keterangan, $judul, $waktu belum melalui htmlspecialchars
#
# [2] Injeksi Input Tidak Divalidasi
#     Variable $input berasal langsung dari $_POST['nama']
#     tanpa sanitasi tambahan sebelum masuk ke preg_match.
#     SonarQube akan menandai ini sebagai Security Hotspot.
#
# [3] Information Disclosure
#     Kode warna ($warna) dan timestamp ($waktu) ditampilkan ke user.
#     Bukan risiko kritis, namun perlu diperhatikan.
#
# Referensi OWASP Top 10 yang relevan:
#   A03:2021 – Injection
#   A07:2021 – Identification and Authentication Failures
#   A03:2021 – Cross-Site Scripting


# ----------------------------------------------------------------
# [I] KONFIGURASI EKSTENSI FILE PHP
# ----------------------------------------------------------------

sonar.php.file.suffixes=.php,.php5,.phtml


# ----------------------------------------------------------------
# [J] LOG & DEBUG
# ----------------------------------------------------------------

# Level log: ERROR, WARN, INFO, DEBUG, TRACE
sonar.log.level=INFO

# Tampilkan detail profiling waktu analisis
sonar.showProfiling=false

# Mode verbose (aktifkan saat troubleshooting)
sonar.verbose=false

# Workspace folder sementara untuk analisis
# sonar.working.directory=.sonar


# ----------------------------------------------------------------
# [K] KONFIGURASI BRANCH (untuk SonarQube Developer Edition+)
# ----------------------------------------------------------------

# Nama branch yang sedang dianalisis
# sonar.branch.name=main

# Branch target untuk analisis pull request
# sonar.pullrequest.base=main
# sonar.pullrequest.branch=feature/nama-fitur
# sonar.pullrequest.key=123


# ================================================================
# CATATAN PENTING:
# - Pastikan sonar-scanner terinstall: https://docs.sonarqube.org/latest/analysis/scan/sonarscanner/
# - Untuk PHP, tidak perlu kompilasi — langsung jalankan scanner
# - Hasil analisis tersedia di: http://localhost:9000/projects
# - Token dapat dibuat di: http://localhost:9000/account/security
# ================================================================
